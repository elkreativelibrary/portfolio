<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>elif sarihan - designer & artist</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    
    /* Main scene with static background */
    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url('desk-scene.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    /* Clickable area over business card (invisible) */
    .clickable-area {
      position: absolute;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    
    .clickable-area:hover {
      opacity: 0.1;
      background: rgba(255, 255, 255, 0.2);
    }
    
    /* Business card hotspot - over the receipt on desk */
    #business-card-hotspot {
      bottom: 28%;
      left: 55%;
      width: 12%;
      height: 15%;
    }
    
    /* Animated steam GIF overlay */
    .steam-animation {
      position: absolute;
      bottom: 40%;
      left: -7%;
      width: 50%;
      height: auto;
      z-index: 10;
      pointer-events: none;
    }
    
    /* Screen glitch overlay */
    .screen-glitch {
      position: absolute;
      top: 4%;
      left: 30%;
      width: 48%;
      height: 22%;
      pointer-events: none;
      animation: screen-flash 8s ease-in-out infinite;
    }
    
    @keyframes screen-flash {
      0%, 90%, 100% {
        opacity: 0;
      }
      
      91% {
        opacity: 0.15;
        background: rgba(255, 255, 255, 0.1);
      }
      
      92% {
        opacity: 0.1;
        background: rgba(150, 180, 255, 0.15);
      }
      
      93% {
        opacity: 0.08;
        background: rgba(255, 255, 255, 0.1);
      }
      
      94% {
        opacity: 0;
      }
    }
    
    /* PDF Viewer Modal */
    .pdf-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    
    .pdf-modal.active {
      display: flex;
    }
    
    .pdf-container {
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 90%;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
    }
    
    .close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
    }
    
    .close-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }
    
    .pdf-viewer {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="scene">
    <!-- Animated Steam GIF -->
    <img src="steam.gif" alt="" class="steam-animation" style="display: block;">
    
    <!-- Screen glitch effect -->
    <div class="screen-glitch"></div>
    
    <!-- Clickable area over business card -->
    <div class="clickable-area" id="business-card-hotspot"></div>
  </div>
  
  <!-- PDF Viewer Modal -->
  <div class="pdf-modal" id="pdf-modal">
    <div class="pdf-container">
      <button class="close-btn" id="close-btn">×</button>
      <iframe class="pdf-viewer" id="pdf-viewer" src=""></iframe>
    </div>
  </div>
  
  <script>
    // Get elements
    const businessCardHotspot = document.getElementById('business-card-hotspot');
    const pdfModal = document.getElementById('pdf-modal');
    const closeBtn = document.getElementById('close-btn');
    const pdfViewer = document.getElementById('pdf-viewer');
    
    // Business card PDF path - UPDATE THIS to your business card PDF filename
    const businessCardPDF = 'business-card.pdf';
    
    // Open PDF viewer
    businessCardHotspot.addEventListener('click', function() {
      pdfViewer.src = businessCardPDF;
      pdfModal.classList.add('active');
      document.body.style.overflow = 'hidden';
    });
    
    // Close PDF viewer
    closeBtn.addEventListener('click', function() {
      pdfModal.classList.remove('active');
      pdfViewer.src = '';
      document.body.style.overflow = 'auto';
    });
    
    // Close on background click
    pdfModal.addEventListener('click', function(e) {
      if (e.target === pdfModal) {
        pdfModal.classList.remove('active');
        pdfViewer.src = '';
        document.body.style.overflow = 'auto';
      }
    });
    
    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && pdfModal.classList.contains('active')) {
        pdfModal.classList.remove('active');
        pdfViewer.src = '';
        document.body.style.overflow = 'auto';
      }
    });
  </script>
</body>
</html>
